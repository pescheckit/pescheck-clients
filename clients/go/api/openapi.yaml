openapi: 3.0.3
info:
  description: "Official client library for the Pescheck API (v2), generated from\
    \ the OpenAPI specification. Authenticate with OAuth2 client credentials and use\
    \ the checks, profiles, screenings, webhooks and divisions endpoints. See https://github.com/pescheckit/pescheck-clients\
    \ for installation and usage."
  title: Pescheck API
  version: 2.0.0
externalDocs:
  description: Find out more about Pescheck
  url: https://pescheck.io
servers:
- description: Production
  url: https://api.pescheck.io
- description: Staging
  url: https://api-staging.pescheck.io
security:
- oauth2:
  - read:api
  - create:api
  - update:api
paths:
  /api/jwt/:
    post:
      description: |-
        Log in with email + password. Returns a JWT pair scoped to your current
        organization (last viewed, or first available).

        For a token scoped to a specific org or division, use POST /api/v2/jwt/generate/.
      operationId: jwt_create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomTokenObtainPair"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CustomTokenObtainPair"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomTokenObtainPair"
          description: ""
      tags:
      - Authentication
  /api/jwt/refresh/:
    post:
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      operationId: jwt_refresh_create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRefresh"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/TokenRefresh"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenRefresh"
          description: ""
      tags:
      - Authentication
  /api/v2/checks/:
    get:
      description: "List the check types this API supports. The list is bounded metadata\
        \ about the available check types (not a paginated collection), so the response\
        \ is a flat array."
      operationId: v2_checks_list
      parameters:
      - description: Restrict the list to a single check type.
        explode: true
        in: query
        name: check_type
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/V2CheckInfo"
                type: array
          description: ""
      tags:
      - Checks
  /api/v2/checks/{check_type}/:
    get:
      operationId: v2_checks_retrieve
      parameters:
      - explode: false
        in: path
        name: check_type
        required: true
        schema:
          pattern: "^[a-z0-9]+$"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V2CheckInfo"
          description: ""
      tags:
      - Checks
  /api/v2/jwt/generate/:
    post:
      description: |-
        Log in with email + password. Returns a JWT pair scoped to the organization or division specified by organisation_id/division_id (defaults to your current org).

        For a plain login, use POST /api/jwt/.
      operationId: generateJWTToken_2
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JWTGeneration"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/JWTGeneration"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JWTResponse"
          description: ""
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
      tags:
      - Authentication
  /api/v2/oauth/applications/:
    post:
      description: Create OAuth application for API access
      operationId: createOAuthApplication_2
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuthApplication"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/OAuthApplication"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthApplicationResponse"
          description: ""
        "400":
          description: Bad Request
        "403":
          description: Forbidden
        "429":
          description: Rate limit exceeded
      tags:
      - OAuth
  /api/v2/oauth/applications/{application_id}/:
    delete:
      description: Delete an OAuth application
      operationId: deleteOAuthApplication_2
      parameters:
      - description: Application ID to delete
        explode: false
        in: path
        name: application_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Application deleted
        "403":
          description: Forbidden
        "404":
          description: Application not found
      tags:
      - OAuth
  /api/v2/oauth/applications/list/:
    get:
      description: List OAuth applications for the organization
      operationId: listOAuthApplications_2
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/OAuthApplicationResponse"
                type: array
          description: ""
        "403":
          description: Forbidden
      tags:
      - OAuth
  /api/v2/organisations/divisions/:
    get:
      description: |-
        List method that handles both paginated and unpaginated responses
        and enforces the max_total_records limit (500).
      operationId: v2_organisations_divisions_list
      parameters:
      - description: A page number within the paginated result set.
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          description: Page number within the paginated result set.
          example: 1
          minimum: 1
          type: integer
        style: form
      - description: Number of results to return per page.
        explode: true
        in: query
        name: page_size
        required: false
        schema:
          default: 50
          description: "Number of results per page (max: 100)"
          example: 50
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - description: "Enable/disable pagination. When false, max 500 records returned."
        explode: true
        in: query
        name: paginate
        required: false
        schema:
          default: true
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedDivisionReadOnlyList"
          description: ""
      tags:
      - Divisions
    post:
      description: |-
        Create a division (a child organisation under the current parent org).
        Divisions are an advanced, rarely-needed feature: create one ONLY when the
        user has clearly stated they want to manage a separate business unit,
        location, or legal entity under their account. Do NOT create a division
        just to organise screenings, for a single-person or single-member
        organisation, or without an explicit request to do so. When in doubt, ask
        the user to confirm before calling this tool.
      operationId: v2_organisations_divisions_create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DivisionWrite"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DivisionWrite"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DivisionWrite"
          description: ""
      tags:
      - Divisions
  /api/v2/organisations/divisions/{id}/:
    get:
      description: |-
        A division is a child organisation under a parent org, used only when a
        customer needs to manage genuinely separate business units, locations, or
        legal entities under one account. The vast majority of organisations operate
        as a single entity and need no divisions. Only top-level (parent)
        organisations can have divisions.
      operationId: v2_organisations_divisions_retrieve
      parameters:
      - description: A UUID string identifying this organisation.
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DivisionReadOnly"
          description: ""
      tags:
      - Divisions
    patch:
      description: |-
        A division is a child organisation under a parent org, used only when a
        customer needs to manage genuinely separate business units, locations, or
        legal entities under one account. The vast majority of organisations operate
        as a single entity and need no divisions. Only top-level (parent)
        organisations can have divisions.
      operationId: v2_organisations_divisions_partial_update
      parameters:
      - description: A UUID string identifying this organisation.
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchedDivisionWrite"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PatchedDivisionWrite"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DivisionWrite"
          description: ""
      tags:
      - Divisions
    put:
      description: |-
        Update an existing division's contact, billing, and address details.

        Override also triggers a webhook on successful PUT and PATCH requests.
      operationId: v2_organisations_divisions_update
      parameters:
      - description: A UUID string identifying this organisation.
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DivisionWrite"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DivisionWrite"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DivisionWrite"
          description: ""
      tags:
      - Divisions
  /api/v2/profiles/:
    get:
      operationId: v2_profiles_list
      parameters:
      - description: Restrict to profiles containing at least one check of this type.
        explode: true
        in: query
        name: check_type
        required: false
        schema:
          enum:
          - addresscheck
          - adversemediacheck
          - bigcheck
          - criminalrecordscheck
          - criminalrecordsuploadcheck
          - customintegritycheck
          - cvcheck
          - edrcheck
          - id2check
          - integritycheck
          - openhealthcarecheck
          - qualificationcheck
          - righttoworkcheck
          - vogcheck
          - watchlist2check
          - watchlistcheck
          - workreferencecheck
          - worldwidecreditcheck
          type: string
        style: form
      - description: Restrict to custom (true) or system (false) profiles.
        explode: true
        in: query
        name: is_custom
        required: false
        schema:
          type: boolean
        style: form
      - description: Restrict to profiles whose name contains this value (case-insensitive).
        explode: true
        in: query
        name: name
        required: false
        schema:
          type: string
        style: form
      - description: A page number within the paginated result set.
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          description: Page number within the paginated result set.
          example: 1
          minimum: 1
          type: integer
        style: form
      - description: Number of results to return per page.
        explode: true
        in: query
        name: page_size
        required: false
        schema:
          default: 50
          description: "Number of results per page (max: 100)"
          example: 50
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - description: "Enable/disable pagination. When false, max 500 records returned."
        explode: true
        in: query
        name: paginate
        required: false
        schema:
          default: true
          type: boolean
        style: form
      - description: Which field to use when ordering the results.
        explode: true
        in: query
        name: sort
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                ProfileListItem:
                  summary: Profile list item
                  value:
                    count: 1
                    next: null
                    previous: null
                    results:
                    - id: 018e9f1e-3a73-7eba-b29c-c2c4a8c40c8a
                      name: VOG + Watchlist Screening
                      description: Dutch certificate of good behavior plus international
                        watchlist check.
                      is_custom: true
                      check_types:
                      - vogcheck
                      - watchlist2check
                      created_at: 2026-05-13T10:30:00Z
                      updated_at: 2026-05-13T10:30:00Z
              schema:
                $ref: "#/components/schemas/PaginatedV2ProfileListItemList"
          description: ""
      tags:
      - Profiles
    post:
      operationId: v2_profiles_create
      requestBody:
        content:
          application/json:
            examples:
              VOG+WatchlistProfile:
                summary: VOG + watchlist profile
                value:
                  name: VOG + Watchlist Screening
                  description: Dutch certificate of good behavior plus international
                    watchlist check.
                  checks:
                  - check_type: vogcheck
                    config:
                      org_name: Pescheck
                      function: Senior Accountant
                      profiles:
                      - "11"
                      - "12"
                  - check_type: watchlist2check
                    config:
                      threshold: 80
                      cutoff: 50
                      topics:
                      - sanctions
                      - pep
            schema:
              $ref: "#/components/schemas/V2ProfileCreate"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/V2ProfileCreate"
        required: true
      responses:
        "201":
          content:
            application/json:
              examples:
                ProfileDetail:
                  summary: Profile detail
                  value:
                    id: 018e9f1e-3a73-7eba-b29c-c2c4a8c40c8a
                    name: VOG + Watchlist Screening
