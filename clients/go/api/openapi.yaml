      - Profiles
    put:
      description: |-
        Replace the profile. Checks matched by profile_check_id are updated
        in place; entries without one are added; existing checks not referenced
        in the request are removed.
      operationId: v2_profiles_update
      parameters:
      - description: A UUID string identifying this profile.
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            examples:
              ReplaceProfileChecks:
