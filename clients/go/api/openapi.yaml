  /api/v2/profiles/{id}/:
    delete:
      operationId: v2_profiles_destroy
      parameters:
      - description: A UUID string identifying this profile.
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "204":
          description: No response body
      tags:
      - Profiles
    get:
      operationId: v2_profiles_retrieve
      parameters:
      - description: A UUID string identifying this profile.
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              examples:
                ProfileDetail:
