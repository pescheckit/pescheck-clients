          description: Dashboard URL for this screening.
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - candidate
      - candidate_wizard_url
      - checks
      - created_at
      - dashboard_url
      - id
      - profile
      - screening_notes
      - status
      - updated_at
    V2ScreeningListItem:
      type: object
      description: |-
        List shape for GET /screenings/. Same candidate as detail; the only thing
        we slim here is per-check info (status only), since config/input/output are
        heavy and rarely needed at list time.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        status:
          type: string
        profile:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
          nullable: true
          readOnly: true
        candidate:
          allOf:
          - $ref: '#/components/schemas/V2Candidate'
          readOnly: true
        checks:
          type: array
          items:
            $ref: '#/components/schemas/V2ScreeningCheckListItem'
          readOnly: true
        candidate_wizard_url:
          type: string
          format: uri
          nullable: true
          readOnly: true
        dashboard_url:
          type: string
          format: uri
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - candidate
      - candidate_wizard_url
      - checks
      - created_at
      - dashboard_url
      - id
      - profile
      - updated_at
    V2ScreeningNote:
      type: object
      description: |-
        A note recorded on the screening. `check_id` is the Check the note targets
        (null for type-only or unscoped notes).
      properties:
        note:
          type: string
        check_type:
          type: string
        check_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
      - check_id
      - check_type
      - created_at
      - note
    V2ScreeningNoteInput:
      type: object
      description: |-
        A note to record on the screening at creation. Scope it to a specific check with
        `profile_check_id` (links the note to the Check spawned from that ProfileCheck) or to
        a `check_type`; `profile_check_id` wins when both are given. With neither, the note is
        recorded against the screening with no check (check_type 'other').
      properties:
        note:
          type: string
        profile_check_id:
          type: string
          format: uuid
          nullable: true
          description: Links the note to the Check spawned from this ProfileCheck.
            Wins over check_type.
        check_type:
          enum:
          - addresscheck
          - adversemedia2check
          - adversemediacheck
          - bigcheck
          - criminalrecordscheck
          - criminalrecordsuploadcheck
          - customintegritycheck
          - cvcheck
          - edrcheck
          - focumcheck
          - id2check
          - idcheck
          - integritycheck
          - openhealthcarecheck
          - permissioncheck
          - pescheckadversemediacheck
          - qualificationcheck
          - righttoworkcheck
          - vogcheck
          - watchlist2check
          - watchlistcheck
          - workreferencecheck
          - worldwidecreditcheck
          - ''
          type: string
          x-spec-enum-id: d4cf17b1eff0d66d
          description: |-
            Scope the note to a check type. Ignored when profile_check_id is given.

            * `addresscheck` - addresscheck
            * `adversemedia2check` - adversemedia2check
            * `adversemediacheck` - adversemediacheck
            * `bigcheck` - bigcheck
            * `criminalrecordscheck` - criminalrecordscheck
            * `criminalrecordsuploadcheck` - criminalrecordsuploadcheck
            * `customintegritycheck` - customintegritycheck
            * `cvcheck` - cvcheck
            * `edrcheck` - edrcheck
            * `focumcheck` - focumcheck
            * `id2check` - id2check
            * `idcheck` - idcheck
            * `integritycheck` - integritycheck
            * `openhealthcarecheck` - openhealthcarecheck
            * `permissioncheck` - permissioncheck
            * `pescheckadversemediacheck` - pescheckadversemediacheck
            * `qualificationcheck` - qualificationcheck
            * `righttoworkcheck` - righttoworkcheck
            * `vogcheck` - vogcheck
            * `watchlist2check` - watchlist2check
            * `watchlistcheck` - watchlistcheck
            * `workreferencecheck` - workreferencecheck
            * `worldwidecreditcheck` - worldwidecreditcheck
      required:
      - note
    VerifyWebhook:
      type: object
      description: |-
        Body shape for POST /webhooks/{id}/verify/. The verification code is the
        one sent to the webhook URL when the webhook was created; the receiver POSTs
        it back here to confirm ownership.
      properties:
        verification_code:
          type: string
          description: The verification code delivered to the webhook URL on creation.
      required:
      - verification_code
    Webhook:
      type: object
      description: Serializer for webhook creation/update requests
      properties:
        name:
          type: string
          description: Descriptive name for this webhook
          maxLength: 255
        url:
          type: string
          format: uri
          description: HTTPS URL where webhook events will be sent
        events:
          type: array
          items:
            enum:
            - check.status_changed
            - screening.status_changed
            - screening.archived
            - package.created
            - package.updated
            - profile.created
            - profile.updated
            - division.created
            - division.updated
            type: string
            description: |-
              * `check.status_changed` - check.status_changed
              * `screening.status_changed` - screening.status_changed
              * `screening.archived` - screening.archived
              * `package.created` - package.created
              * `package.updated` - package.updated
              * `profile.created` - profile.created
              * `profile.updated` - profile.updated
              * `division.created` - division.created
              * `division.updated` - division.updated
            x-spec-enum-id: 4434dcfa22790647
          description: 'List of events to subscribe to. Valid events: check.status_changed,
            screening.status_changed, screening.archived, package.created, package.updated,
            profile.created, profile.updated, division.created, division.updated'
        active:
          type: boolean
          default: true
          description: Whether the webhook is active
        division_id:
          type: string
          format: uuid
          description: Division ID to create webhook for (optional)
      required:
      - events
      - name
      - url
    WebhookResponse:
      type: object
      description: Serializer for webhook responses
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        url:
          type: string
          format: uri
          maxLength: 200
        events:
          readOnly: true
        active:
          type: boolean
        verified:
          type: boolean
          readOnly: true
        token:
          type: string
          readOnly: true
          nullable: true
        organisation_name:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - events
      - id
      - name
      - organisation_name
      - token
      - updated_at
      - url
      - verified
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Secure-sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://api.pescheck.io/api/o/authorize/
          tokenUrl: https://api.pescheck.io/api/o/token/
          refreshUrl: https://api.pescheck.io/api/o/token/
          scopes:
            read:api: read groups
            create:api: create groups
            update:api: update groups
        clientCredentials:
          tokenUrl: https://api.pescheck.io/api/o/token/
          refreshUrl: https://api.pescheck.io/api/o/token/
          scopes:
            read:api: read groups
            create:api: create groups
            update:api: update groups
        password:
          tokenUrl: https://api.pescheck.io/api/o/token/
          refreshUrl: https://api.pescheck.io/api/o/token/
          scopes:
            read:api: read groups
            create:api: create groups
            update:api: update groups
