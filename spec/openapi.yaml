openapi: 3.0.3
info:
  title: Pescheck API
  version: 2.0.0
  description: |-
    API for Pescheck

    ## Authentication
    This API supports three authentication methods:
    1. **OAuth2** (recommended for API clients) - Use client credentials flow
    2. **JWT Bearer** (for user-based access) - Obtain tokens via /api/jwt/ endpoint
    3. **Cookie** (for browser-based access) - Session authentication via web login

    ## Quick Start for API Clients
    1. Select your environment from the servers dropdown
    2. Use OAuth2 with client credentials flow
    3. Scopes are automatically included: read:api, create:api, update:api
paths:
  /api/jwt/:
    post:
      operationId: jwt_create
      description: |-
        Log in with email + password. Returns a JWT pair scoped to one organization.

        Pass organization_id to select the organization or division to act for;
        it is required when your account has access to more than one. Without
        it, your single organization is used.
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomTokenObtainPair'
          description: ''
  /api/jwt/refresh/:
    post:
      operationId: jwt_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/checks/:
    get:
      operationId: v1_checks_list
      description: Return a list of all available checks
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
          minimum: 1
          default: 1
          example: 1
          description: Page number within the paginated result set.
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
          example: 50
          description: 'Number of results per page (max: 100)'
      - name: paginate
        required: false
        in: query
        description: Enable/disable pagination. When false, max 500 records returned.
        schema:
          type: boolean
          default: true
      tags:
      - Checks
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCheckList'
          description: ''
  /api/v1/jwt/generate/:
    post:
      operationId: generateJWTToken
      description: |-
        Log in with email + password. Returns a JWT pair scoped to the organization or division specified by organisation_id/division_id. Without it, your single organization is used; accounts with access to more than one organization must specify one.

        For a plain login, use POST /api/jwt/.
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JWTGeneration'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/JWTGeneration'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWTResponse'
          description: ''
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/v1/oauth/applications/:
    post:
      operationId: createOAuthApplication
      description: Create OAuth application for API access
      tags:
      - OAuth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthApplication'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OAuthApplication'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthApplicationResponse'
          description: ''
        '400':
          description: Bad Request
        '403':
          description: Forbidden
        '429':
          description: Rate limit exceeded
  /api/v1/oauth/applications/{application_id}/:
    delete:
      operationId: deleteOAuthApplication
      description: Delete an OAuth application
      parameters:
      - in: path
        name: application_id
        schema:
          type: string
        description: Application ID to delete
        required: true
      tags:
      - OAuth
      responses:
        '204':
          description: Application deleted
        '403':
          description: Forbidden
        '404':
          description: Application not found
  /api/v1/oauth/applications/list/:
    get:
      operationId: listOAuthApplications
      description: List OAuth applications for the organization
      tags:
      - OAuth
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
