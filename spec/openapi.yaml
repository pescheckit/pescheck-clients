components:
  schemas:
    Bucket:
      type: object
      description: |-
        VOG Check serializer mixin.

        Adds vog_org_name, vog_function, vog_profiles fields to serializers.
        Provides validation and response transformation for VOG check.
      properties:
        vog_org_name:
          type: string
          description: Organization name for VOG request
          maxLength: 255
        vog_function:
          type: string
          description: Function or job title for VOG screening
          maxLength: 40
        vog_profiles:
          nullable: true
          description: VOG screening profiles. Accepts string or list. Returns string
            in responses for backwards compatibility.
        adversemedia_regions:
          type: array
          items:
            type: string
          description: 'Regions/languages for adverse media search. Valid values:
            NL_BE, NL_NL, EN_GB, EN_US, FR_BE, FR_FR, DE_DE, IT_IT, ES_ES, SV_SE'
        adversemedia2_min_adversity:
          type: number
          format: double
          maximum: 1.0
          minimum: 0.0
          nullable: true
          description: Minimum adversity score (0-1) for a hit to be included. Defaults
            to 0.7 when omitted.
        big_profession:
          type: string
          description: 'Healthcare profession for BIG registry search (case-insensitive).
            Valid options: Apothekers, Arts, Clinical technologist, Dentist, Doctor
            of medicine, Fysiotherapeut, Geregistreerd-mondhygiĂ«nist, Gezondheidszorgpsycholoog,
            Healthcare psychologist, Klinisch technoloog, Midwife, Nurse, Orthopedagogen-generalistt,
            Pharmacist, Physician assistant, Physiotherapist, Psychotherapeuten, Psychotherapist,
            Registered dental hygienist, Remedial educationalist, Tandarts, Verloskundige,
            Verpleegkundigen'
        watchlist_threshold:
          type: string
          nullable: true
          description: Watchlist search threshold score (0-100, returned as string
            for backwards compat)
        watchlist_cutoff:
          type: string
          nullable: true
          description: Watchlist search cutoff score (0-100, returned as string for
            backwards compat)
        watchlist_notes:
          type: string
          nullable: true
          description: Additional notes for watchlist search
        rtw_requested_country:
          type: array
          items:
            type: string
          description: 'Country for Right to Work check. Must contain ONLY 1 country
            code (ISO 3166-1 alpha-2). Example: [''NL''] for Netherlands, [''DE'']
            for Germany, [''BE''] for Belgium'
        worldwidecreditcheck_candidate_country:
          type: string
          description: 'Country code for Worldwide Credit Check candidate (ISO 3166-1
            alpha-2). Example: ''NL'' for Netherlands, ''DE'' for Germany, ''GB''
            for United Kingdom'
        openhealthcarecheck_registers:
          type: array
          items:
            type: string
          description: 'Healthcare registers to search. Valid: agb, art_therapy, big,
            paramedic, rbcz, skj_youth, social_domain. Empty = all.'
        openhealthcarecheck_lookup_mode:
          enum:
          - name
          - registration_number
          type: string
          x-spec-enum-id: 3d071fcbf208af57
          description: |-
            Lookup mode: 'name' or 'registration_number'.

            * `name` - name
            * `registration_number` - registration_number
        openhealthcarecheck_registration_number:
          type: string
          nullable: true
          description: Registration number for direct register lookup.
        watchlist_date_of_birth:
          type: string
          description: 'DEPRECATED: Use date_of_birth instead. Backwards compatibility
            only.'
        watchlist_nationality:
          type: string
          description: 'DEPRECATED: Use nationality instead. Backwards compatibility
            only.'
    Check:
