      description: |-
        Create a new screening.

        Requires email, first_name, last_name, and a package_id. v1 screening
        creation is package-based; profiles are a v2 concept, created and used
        through the v2 API.
      tags:
      - Screening
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Screening'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Screening'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screening'
          description: ''
  /api/v1/screenings/{id}/:
    get:
      operationId: v1_screenings_retrieve
      description: Get details of a screening including its checks and status.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this screening.
        required: true
      tags:
      - Screening
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screening'
          description: ''
  /api/v1/screenings/{id}/document/:
    get:
      operationId: v1_screenings_document_retrieve
      description: Retrieve Base64-encoded documents related to a screening, including
        ID checks, qualifications, and document reader documents.
      summary: Retrieve screening documents
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this screening.
        required: true
      tags:
      - Screening
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScreeningDocumentsResponse'
              examples:
                DocumentResponseExample:
                  value:
                    id_check_documents:
                    - type: DOCUMENT
                      extension: .jpg
                      file: iVBORw0KGgoAAAANSUhEUgAAAAUA...
                    id2_check_documents:
                    - type: Front
                      extension: .png
                      file: iVBORw0KGgoAAAANSUhEUgAAAAUA...
                    qualification_documents:
                    - filename: degree_certificate.pdf
                      extension: .pdf
                      file: JVBERi0xLjQKJeLjz9MK...
                    document_reader_documents:
                    - type: CRIMINAL_RECORD
                      country: NL
                      extension: .jpg
                      file: JVBORw0KGgoAAAANSUhEUgAAAAUA...
                      status: CLEAN
                  summary: Document Response Example
          description: ''
  /api/v1/webhooks/:
    post:
      operationId: createWebhook
      description: |-
        Create webhook for event notifications.

                **Authentication Notes:**
                - OAuth2: Organization is automatically determined from the OAuth application
                - If your OAuth app has no organization set, pass it via `X-Organization-Id` header or `organization_id` query parameter

                **Valid Events:**
                - `check.started` - Check has been initiated
                - `check.completed` - Check has been completed successfully
                - `check.failed` - Check has failed
                - `screening.created` - New screening has been created
                - `screening.completed` - Screening has been completed
                - `screening.archived` - Screening has been archived
                - `package.created` - New package has been created
                - `package.updated` - Package has been updated
                - `division.created` - New division has been created
                - `division.updated` - Division has been updated

                Limited to 5 webhooks per organization/division.
      parameters:
      - in: header
        name: X-Organization-Id
        schema:
          type: string
        description: Organization ID (for JWT/Session auth only)
      - in: query
        name: organization_id
        schema:
          type: string
        description: Organization ID (for JWT/Session auth only)
      tags:
      - Webhooks
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Webhook'
            examples:
              CreateWebhookExample:
                value:
                  name: My Event Webhook
                  url: https://webhook.site/4a33d2f6-48a8-4b49-b6c4-a7bb044c8cb3
                  events:
                  - check.completed
                  - screening.created
                  - screening.completed
                  active: true
                  division_id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                summary: Create Webhook Example
                description: Example of creating a webhook for check and screening
                  events
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Webhook'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookResponse'
              examples:
                CreateWebhookExample:
                  value:
                    name: My Event Webhook
                    url: https://webhook.site/4a33d2f6-48a8-4b49-b6c4-a7bb044c8cb3
                    events:
                    - check.completed
                    - screening.created
                    - screening.completed
                    active: true
                    division_id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  summary: Create Webhook Example
                  description: Example of creating a webhook for check and screening
                    events
          description: ''
        '400':
          description: Bad Request
        '403':
          description: Forbidden - Organization not found or no permission
        '409':
          description: Conflict - Max webhooks reached
  /api/v1/webhooks/{webhook_id}/:
    delete:
      operationId: deleteWebhook
      description: Delete a webhook
      parameters:
