name: Unit tests

# Runs the generator's per-API/per-model unit tests for each client (offline,
# no API token). The generated tests are currently skipped/incomplete stubs, so
# this mainly proves each test harness compiles + runs against the client and
# gives a place to add real assertions. Complements the e2e suite (which does the
# real CRUD against staging in e2e.yml).
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
    paths: ["clients/**", ".github/workflows/unit-tests.yml"]

defaults:
  run:
    shell: bash

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install -e clients/python
      - run: cd clients/python && python -m unittest discover -s test -p "test_*.py" -v

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: "1.23", cache: false }
      - run: cd clients/go && go mod tidy && go test ./...

  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: "17", cache: maven }
      - run: cd clients/java && mvn -B -q test

  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with: { php-version: "8.2", extensions: "curl, mbstring, json" }
      - run: cd clients/php && composer install --no-interaction --no-progress
      - run: cd clients/php && vendor/bin/phpunit

  ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: "3.3" }
      - run: cd clients/ruby && gem build *.gemspec && gem install ./pescheck-client-*.gem && gem install rspec
      - run: cd clients/ruby && rspec -Ilib

  csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: "8.0.x" }
      - run: dotnet test clients/csharp -c Release

  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      - run: cd clients/javascript && npm install && npm test

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cd clients/rust && cargo test
