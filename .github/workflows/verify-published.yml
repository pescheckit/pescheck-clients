name: Verify published packages

# Post-publish smoke test: install each SDK FROM its public registry (not the
# repo) and confirm it imports. Run manually after a release once the registries
# have indexed the new version. Retries to absorb propagation delay.
on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to verify (e.g. 0.0.1)
        required: true
        default: "0.0.1"

jobs:
  npm-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      - run: |
          mkdir t && cd t && npm init -y >/dev/null
          for i in $(seq 1 10); do
            npm install "@pescheckit/api-client@${{ inputs.version }}" && break || { echo "retry $i…"; sleep 20; }
          done
          test -f node_modules/@pescheckit/api-client/package.json
          echo "VERIFIED: @pescheckit/api-client@${{ inputs.version }} installs from npm"

  npm-javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      - run: |
          mkdir t && cd t && npm init -y >/dev/null
          for i in $(seq 1 10); do
            npm install "@pescheckit/api-client-js@${{ inputs.version }}" && break || { echo "retry $i…"; sleep 20; }
          done
          node -e "require('@pescheckit/api-client-js'); console.log('require ok')"
          echo "VERIFIED: @pescheckit/api-client-js@${{ inputs.version }} installs + requires from npm"

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          cargo new t && cd t
          for i in $(seq 1 10); do
            cargo add "pescheck@${{ inputs.version }}" && break || { echo "retry $i…"; sleep 20; }
          done
          cargo build
          echo "VERIFIED: pescheck ${{ inputs.version }} builds from crates.io"

  ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: "3.3" }
      - run: |
          for i in $(seq 1 10); do
            gem install pescheck -v "${{ inputs.version }}" && break || { echo "retry $i…"; sleep 20; }
          done
          ruby -e "require 'pescheck'; puts 'require ok'"
          echo "VERIFIED: pescheck ${{ inputs.version }} installs + requires from RubyGems"

  php-packagist:
    runs-on: ubuntu-latest
    steps:
      - uses: shivammathur/setup-php@v2
        with: { php-version: "8.2", extensions: "curl, mbstring, json" }
      - run: |
          mkdir t && cd t
          for i in $(seq 1 10); do
            composer require "pescheckit/pescheck-clients:${{ inputs.version }}" --no-interaction && break || { echo "retry $i…"; sleep 20; }
          done
          php -r 'require "vendor/autoload.php"; class_exists("Pescheck\\Client\\Api\\ChecksApi") or exit(1); echo "autoload ok\n";'
          echo "VERIFIED: pescheckit/pescheck-clients ${{ inputs.version }} installs from Packagist"
