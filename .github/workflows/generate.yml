name: Regenerate clients

# Re-fetch the upstream OpenAPI schema, filter it to v2, regenerate all 10
# clients, and open a PR if anything changed.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # every Monday 06:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tooling
        run: npm ci

      - name: Fetch + filter + generate
        run: npm run build
        env:
          PESCHECK_SCHEMA_URL: https://api.pescheck.io/api/schema/

      - name: Open PR on changes
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: regenerate clients from latest OpenAPI schema"
          title: "Regenerate API clients"
          body: |
            Automated regeneration from the latest Pescheck OpenAPI schema.
            Review the diff in `spec/` and `clients/` before merging.
          branch: automated/regenerate-clients
          add-paths: |
            spec/
            clients/
