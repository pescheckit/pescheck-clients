name: Regenerate clients

# Re-fetch the upstream OpenAPI schema, filter it to v2, regenerate all 10
# clients, and — if that drifts from what's committed (i.e. the upstream API
# changed) — open an ISSUE so a human regenerates + reviews. Does NOT open a PR.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # every Monday 06:00 UTC

permissions:
  contents: read
  issues: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tooling
        run: npm ci

      - name: Fetch + filter + generate
        run: npm run build
        env:
          PESCHECK_SCHEMA_URL: https://api.pescheck.io/api/schema/

      - name: Detect drift
        id: drift
        run: |
          if [ -n "$(git status --porcelain spec clients)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No drift — clients are up to date."
          fi

      - name: Open issue if drifted
        if: steps.drift.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="Clients out of date — regenerate from latest schema"
          existing=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "Issue #$existing already open; skipping."
            exit 0
          fi
          changed="$(git status --porcelain spec clients | head -60)"
          body=$(printf 'The scheduled regeneration differs from the committed clients — the upstream Pescheck OpenAPI schema has changed.\n\n**Action:** run `make build` locally and open a PR with the regenerated `spec/` + `clients/`.\n\nChanged paths:\n```\n%s\n```' "$changed")
          gh issue create --repo "$GITHUB_REPOSITORY" --title "$TITLE" --body "$body"
