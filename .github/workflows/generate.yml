name: Regenerate clients

# Re-fetch the upstream OpenAPI schema, filter it to v2, regenerate all 10
# clients, and - if that drifts from what's committed (the upstream API changed) -
# open a PULL REQUEST with the regenerated spec/ + clients/ for review. CI does
# the regeneration; a human reviews + merges, so you stay in control. Does NOT
# commit to main directly.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # every Monday 06:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: false

      - name: Install tooling
        run: npm ci

      - name: Fetch + filter + generate
        run: npm run build
        env:
          # Track STAGING, not prod: new API fields land on staging first, and the
          # e2e tests run against staging too. Fetching staging here means the
          # regen PR shows up when the API actually changes - ahead of an e2e break -
          # instead of after prod catches up.
          PESCHECK_SCHEMA_URL: https://api-staging.pescheck.io/api/schema/

      # The generator writes a go.mod requiring testify but doesn't populate
      # go.sum; complete it so the regenerated Go client actually builds.
      - name: Complete Go go.sum
        run: cd clients/go && go mod tidy

      # Opens (or updates) a PR only if spec/ or clients/ actually changed;
      # a no-op when there's no drift. Review the diff and merge to adopt.
      - name: Open PR if the clients drifted
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automated/regenerate-clients
          delete-branch: true
          add-paths: |
            spec
            clients
          commit-message: "chore: regenerate clients from latest OpenAPI schema"
          title: "Regenerate clients from latest OpenAPI schema"
          body: |
            The upstream Pescheck OpenAPI schema changed, so the scheduled
            **Regenerate clients** workflow regenerated `spec/` + the 10 clients.

            Review the diff and merge to adopt the changes. If nothing here looks
            intentional, close the PR and investigate the upstream schema change.

            > Note: this PR is created with the built-in `GITHUB_TOKEN`, so the
            > e2e/build checks do not auto-run on it (GitHub blocks token-created
            > PRs from triggering workflows). They run on `main` after you merge.
          labels: |
            automated
            codegen
