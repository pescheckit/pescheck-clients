name: Publish clients

# Publish each language SDK to its registry on a release tag (vX.Y.Z) or manual
# dispatch. Jobs are independent. Each registry that needs a token only runs when
# that token/flag is configured, so unconfigured registries SKIP (not fail).
#
# Tokens/flags (repo Settings -> Secrets and variables -> Actions):
#   NPM_TOKEN             secret   - npm (TypeScript + JavaScript)         [set]
#   CARGO_REGISTRY_TOKEN  secret   - crates.io (Rust)                      [set]
#   RUBYGEMS_API_KEY      secret   - RubyGems (Ruby)                       [set]
#   NUGET_API_KEY         secret   - NuGet (C#)                            [needed]
#   PUBLISH_PYPI          variable - set to "true" once a PyPI Trusted     [needed]
#                                    Publisher is registered (no secret)
# Java -> GitHub Packages, Go -> git tag, C++ -> release asset: built-in token.
# PHP -> Packagist auto-updates from the repo (one-time Submit on packagist.org).
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  npm:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [typescript, javascript]
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - if: env.NODE_AUTH_TOKEN == ''
        run: echo "::warning::NPM_TOKEN not set — skipping npm publish for ${{ matrix.dir }}"
      - if: env.NODE_AUTH_TOKEN != ''
        working-directory: clients/${{ matrix.dir }}
        run: |
          npm install
          npm run build --if-present
          npm publish --access public

  rust:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - if: env.CARGO_REGISTRY_TOKEN == ''
        run: echo "::warning::CARGO_REGISTRY_TOKEN not set — skipping crates.io publish"
      - if: env.CARGO_REGISTRY_TOKEN != ''
        working-directory: clients/rust
        run: cargo publish --allow-dirty --token "$CARGO_REGISTRY_TOKEN"

  ruby:
    runs-on: ubuntu-latest
    env:
      RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - if: env.RUBYGEMS_API_KEY == ''
        run: echo "::warning::RUBYGEMS_API_KEY not set — skipping RubyGems publish"
      - if: env.RUBYGEMS_API_KEY != ''
        working-directory: clients/ruby
        run: |
          gem build *.gemspec
          mkdir -p ~/.gem
          printf -- "---\n:rubygems_api_key: %s\n" "$RUBYGEMS_API_KEY" > ~/.gem/credentials
          chmod 600 ~/.gem/credentials
          gem push *.gem

  csharp:
    runs-on: ubuntu-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - if: env.NUGET_API_KEY == ''
        run: echo "::warning::NUGET_API_KEY not set — skipping NuGet publish"
      - if: env.NUGET_API_KEY != ''
        working-directory: clients/csharp
        run: |
          dotnet pack -c Release -o ./artifacts
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json --skip-duplicate

  python:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v7
      - if: vars.PUBLISH_PYPI != 'true'
        run: echo "::warning::PUBLISH_PYPI != true — register a PyPI Trusted Publisher, then set the PUBLISH_PYPI variable"
      - if: vars.PUBLISH_PYPI == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - if: vars.PUBLISH_PYPI == 'true'
        working-directory: clients/python
        run: |
          python -m pip install --upgrade build
          python -m build
      - if: vars.PUBLISH_PYPI == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: clients/python/dist

  # Java -> GitHub Packages (built-in token). Maven Central later (needs GPG).
  java:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - working-directory: clients/java
        run: mvn --batch-mode deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Go has no registry: tag the subdir module so `go get` resolves it.
  # Module path: github.com/pescheckit/pescheck-clients/clients/go
  go:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Tag Go submodule
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git tag "clients/go/v${VERSION}"
          git push origin "clients/go/v${VERSION}"

  # C++ has no canonical registry: attach a source tarball to the GitHub Release.
  cpp:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Package C++ client
        run: tar -czf pescheck-cpp-${GITHUB_REF_NAME}.tar.gz -C clients cpp
      - uses: softprops/action-gh-release@v2
        with:
          files: pescheck-cpp-*.tar.gz
