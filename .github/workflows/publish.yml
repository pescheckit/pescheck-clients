name: Publish clients

# Per-ecosystem release pipeline. Build + test EVERYTHING first (the e2e suite as
# a gate); if it fails, nothing publishes. Each registry job then: lint -> build ->
# (if its token/flag is set) publish -> verify the EXACT released version installs
# back FROM the registry (retries for propagation, clear error if truly missing).
#
# Tokens/flags (Settings -> Secrets and variables -> Actions):
#   NPM_TOKEN  CARGO_REGISTRY_TOKEN  RUBYGEMS_API_KEY  PYPI_API_TOKEN  (secrets)
#   PUBLISH_NUGET=true (variable, NuGet OIDC trusted publishing)
# Java -> GitHub Packages, Go -> tag, C++ -> release asset use the built-in token.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # Build + test everything first. If the e2e suite fails, no publish job runs.
  test:
    uses: ./.github/workflows/e2e.yml
    secrets: inherit

  typescript:
    runs-on: ubuntu-latest
    needs: test
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "20", registry-url: "https://registry.npmjs.org" }
      - name: Set version from tag
        uses: ./.github/actions/set-version
        with: { ecosystem: npm, path: clients/typescript }
      - name: Install
        working-directory: clients/typescript
        run: npm install
      - name: Lint + build
        working-directory: clients/typescript
        run: npm run build
      - name: Publish
        if: env.NODE_AUTH_TOKEN != ''
        working-directory: clients/typescript
        run: |
          VER=$(node -p "require('./package.json').version")
          if npm view "@pescheckit/pescheck-client@$VER" version >/dev/null 2>&1; then
            echo "@pescheckit/pescheck-client@$VER already published - skipping"
          else
            npm publish --access public
          fi
      - name: Verify from registry (exact version)
        if: env.NODE_AUTH_TOKEN != ''
        uses: ./.github/actions/verify-from-registry
        with:
          ecosystem: npm
          package: "@pescheckit/pescheck-client"
          version: ${{ github.event.release.tag_name || github.ref_name }}

  javascript:
    runs-on: ubuntu-latest
    needs: test
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "20", registry-url: "https://registry.npmjs.org" }
      - name: Set version from tag
        uses: ./.github/actions/set-version
        with: { ecosystem: npm, path: clients/javascript }
      - name: Install + build (babel)
        working-directory: clients/javascript
        run: npm install
      - name: Publish
        if: env.NODE_AUTH_TOKEN != ''
        working-directory: clients/javascript
        run: |
          VER=$(node -p "require('./package.json').version")
          if npm view "@pescheckit/pescheck-client-js@$VER" version >/dev/null 2>&1; then
            echo "@pescheckit/pescheck-client-js@$VER already published - skipping"
          else
            npm publish --access public
          fi
      - name: Verify from registry (exact version)
        if: env.NODE_AUTH_TOKEN != ''
        uses: ./.github/actions/verify-from-registry
        with:
          ecosystem: npm
          package: "@pescheckit/pescheck-client-js"
          version: ${{ github.event.release.tag_name || github.ref_name }}

  ruby:
    runs-on: ubuntu-latest
    needs: test
    env:
      RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: "3.3" }
      - name: Set version from tag
        uses: ./.github/actions/set-version
        with: { ecosystem: rubygems, path: clients/ruby }
      - name: Lint (syntax)
        working-directory: clients/ruby
        run: find lib -name '*.rb' -print0 | xargs -0 -n1 ruby -c >/dev/null
      - name: Build
        working-directory: clients/ruby
        run: gem build *.gemspec
      - name: Publish
        if: env.RUBYGEMS_API_KEY != ''
        working-directory: clients/ruby
        run: |
          VER=$(ls pescheck-client-*.gem | sed -E 's/pescheck-client-(.*)\.gem/\1/')
          if curl -fsS "https://rubygems.org/api/v1/versions/pescheck-client.json" | grep -q "\"number\":\"$VER\""; then
            echo "pescheck-client $VER already on RubyGems - skipping"
          else
            mkdir -p ~/.gem
            printf -- "---\n:rubygems_api_key: %s\n" "$RUBYGEMS_API_KEY" > ~/.gem/credentials
            chmod 600 ~/.gem/credentials
            gem push *.gem
          fi
      - name: Verify from registry (exact version)
        if: env.RUBYGEMS_API_KEY != ''
        uses: ./.github/actions/verify-from-registry
        with:
          ecosystem: rubygems
          package: pescheck-client
          version: ${{ github.event.release.tag_name || github.ref_name }}

  rust:
    runs-on: ubuntu-latest
    needs: test
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Set version from tag
        uses: ./.github/actions/set-version
        with: { ecosystem: cargo, path: clients/rust }
      - name: Lint + build
        working-directory: clients/rust
        run: cargo build
      - name: Publish
        if: env.CARGO_REGISTRY_TOKEN != ''
        working-directory: clients/rust
        run: |
          VER=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if curl -fsS -A "pescheck-ci (brampescheck@gmail.com)" "https://crates.io/api/v1/crates/pescheck-client/$VER" | grep -q "\"num\":\"$VER\""; then
            echo "pescheck-client $VER already on crates.io - skipping"
          else
            cargo publish --allow-dirty --token "$CARGO_REGISTRY_TOKEN"
          fi
      - name: Verify from registry (exact version)
        if: env.CARGO_REGISTRY_TOKEN != ''
        uses: ./.github/actions/verify-from-registry
        with:
          ecosystem: cargo
          package: pescheck-client
          version: ${{ github.event.release.tag_name || github.ref_name }}

  php:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with: { php-version: "8.2", extensions: "curl, mbstring, json" }
      - name: Lint (syntax)
        run: find clients/php/lib -name '*.php' -print0 | xargs -0 -n1 php -l >/dev/null
      - name: Build (validate manifest)
        run: composer validate --no-check-publish
      - name: Verify from registry (exact version)
        uses: ./.github/actions/verify-from-registry
        with:
          ecosystem: packagist
          package: pescheckit/pescheck-client
          version: ${{ github.event.release.tag_name || github.ref_name }}

  csharp:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write # NuGet trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: "8.0.x" }
      - name: Set version from tag
        uses: ./.github/actions/set-version
        with: { ecosystem: nuget, path: clients/csharp }
      - name: Lint + build
        working-directory: clients/csharp
        run: dotnet build -c Release
      - name: NuGet login (OIDC trusted publishing)
        id: nugetlogin
        if: vars.PUBLISH_NUGET == 'true'
        uses: NuGet/login@v1
        with:
          user: pescheck-bram
      - name: Publish
        if: vars.PUBLISH_NUGET == 'true'
        working-directory: clients/csharp
        run: |
          dotnet pack -c Release -o ./artifacts
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "${{ steps.nugetlogin.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json --skip-duplicate
      - name: Verify from registry (exact version)
        if: vars.PUBLISH_NUGET == 'true'
        uses: ./.github/actions/verify-from-registry
        with:
          ecosystem: nuget
          package: Pescheck.Client
          version: ${{ github.event.release.tag_name || github.ref_name }}

  python:
    runs-on: ubuntu-latest
    needs: test
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - name: Set version from tag
        uses: ./.github/actions/set-version
        with: { ecosystem: python, path: clients/python }
      - name: Lint (compile) + build
        working-directory: clients/python
        run: |
          python -m compileall -q pescheck
          python -m pip install --upgrade build
          python -m build
      - name: Publish
        if: env.PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: clients/python/dist
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
      - name: Verify from registry (exact version)
        if: env.PYPI_API_TOKEN != ''
        uses: ./.github/actions/verify-from-registry
        with:
          ecosystem: pypi
          package: pescheck-client
          version: ${{ github.event.release.tag_name || github.ref_name }}

  # Java -> GitHub Packages (built-in token). Maven Central later (needs GPG).
  java:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: "17" }
      - name: Set version from tag
        uses: ./.github/actions/set-version
        with: { ecosystem: java, path: clients/java }
      - name: Lint + build
        working-directory: clients/java
        run: mvn --batch-mode -DskipTests package
      - name: Publish to GitHub Packages
        working-directory: clients/java
        run: |
          VER=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version | tail -1)
          META="https://maven.pkg.github.com/${GITHUB_REPOSITORY}/io/pescheck/pescheck-client/maven-metadata.xml"
          if curl -fsSL -u "$GITHUB_ACTOR:$GITHUB_TOKEN" "$META" 2>/dev/null | grep -q "<version>$VER</version>"; then
            echo "io.pescheck:pescheck-client $VER already on GitHub Packages - skipping"
          else
            mkdir -p ~/.m2
            cat > ~/.m2/settings.xml <<XML
          <settings><servers><server>
            <id>github</id><username>${GITHUB_ACTOR}</username><password>${GITHUB_TOKEN}</password>
          </server></servers></settings>
          XML
            mvn --batch-mode -DskipTests \
              -DaltDeploymentRepository=github::https://maven.pkg.github.com/${GITHUB_REPOSITORY} \
              deploy
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Go: no registry - publishing is a version tag (release only).
  go:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: test
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: "1.23", cache: false }
      - name: Build
        run: cd clients/go && go mod tidy && go build ./...
      - name: Tag Go submodule
        run: |
          TAG="clients/go/${GITHUB_REF_NAME}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "$TAG already exists - skipping"
          else
            git tag "$TAG" && git push origin "$TAG"
          fi

  # C++: no registry - attach a source tarball to the release.
  cpp:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: test
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v7
      - name: Package C++ client
        run: tar -czf pescheck-cpp-${GITHUB_REF_NAME}.tar.gz -C clients cpp
      - uses: softprops/action-gh-release@v2
        with: { files: pescheck-cpp-*.tar.gz }

  # Downloadable per-language zips on the Release, for non-package-manager users.
  archives:
    if: github.event_name == 'release'
    needs: test
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v7
      - name: Zip each client (versioned)
        run: |
          V="${GITHUB_REF_NAME#v}"
          mkdir -p dist-archives
          for d in clients/*/; do
            lang=$(basename "$d")
            (cd clients && zip -rq "../dist-archives/pescheck-client-${lang}-${V}.zip" "$lang")
          done
          ls -la dist-archives
      - uses: softprops/action-gh-release@v2
        with:
          files: dist-archives/*.zip
