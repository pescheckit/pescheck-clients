name: Publish clients

# Per-ecosystem release pipeline. Each job: lint -> build -> (if a token/flag is
# configured) publish to the registry -> test the package by installing it back
# FROM the registry. Each package is self-contained in its ecosystem (npm ships
# only JS/TS, Packagist only PHP via .gitattributes, etc.).
#
# Config (Settings -> Secrets and variables -> Actions):
#   NPM_TOKEN  CARGO_REGISTRY_TOKEN  RUBYGEMS_API_KEY   (secrets) [set]
#   PUBLISH_NUGET=true / PUBLISH_PYPI=true (variables)   — enable once the NuGet /
#   PyPI Trusted Publisher (OIDC) policies are registered (no secret stored).
# Java -> GitHub Packages, Go -> tag, C++ -> release asset use the built-in token.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # Build + test everything first. If the e2e suite fails, no publish job runs.
  test:
    uses: ./.github/workflows/e2e.yml
    secrets: inherit

  typescript:
    runs-on: ubuntu-latest
    needs: test
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "20", registry-url: "https://registry.npmjs.org" }
      - name: Install
        working-directory: clients/typescript
        run: npm install
      - name: Lint + build
        working-directory: clients/typescript
        run: npm run build # tsc — type-checks and compiles
      - name: Publish
        if: env.NODE_AUTH_TOKEN != ''
        working-directory: clients/typescript
        run: npm publish --access public
      - name: Test from registry
        if: env.NODE_AUTH_TOKEN != ''
        run: |
          PKG=@pescheckit/pescheck-client
          mkdir /tmp/t && cd /tmp/t && npm init -y >/dev/null
          ok=""
          for i in 1 2 3 4 5; do npm install "$PKG" && ok=1 && break || { echo "attempt $i: not installable yet, waiting 60s"; sleep 60; }; done
          if [ -n "$ok" ]; then test -f "node_modules/$PKG/package.json" && echo "OK: installed $PKG from npm"
          elif npm view "$PKG" version >/dev/null 2>&1; then echo "::warning::$PKG is published ($(npm view "$PKG" version)) but still propagating"
          else echo "::error::$PKG was NOT found on npm - publish did not land"; exit 1; fi

  javascript:
    runs-on: ubuntu-latest
    needs: test
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "20", registry-url: "https://registry.npmjs.org" }
      - name: Install + build (lint = babel compile)
        working-directory: clients/javascript
        run: npm install
      - name: Publish
        if: env.NODE_AUTH_TOKEN != ''
        working-directory: clients/javascript
        run: npm publish --access public
      - name: Test from registry
        if: env.NODE_AUTH_TOKEN != ''
        run: |
          PKG=@pescheckit/pescheck-client-js
          mkdir /tmp/t && cd /tmp/t && npm init -y >/dev/null
          ok=""
          for i in 1 2 3 4 5; do npm install "$PKG" && ok=1 && break || { echo "attempt $i: not installable yet, waiting 60s"; sleep 60; }; done
          if [ -n "$ok" ]; then node -e "require('@pescheckit/pescheck-client-js'); console.log('OK: required $PKG from npm')"
          elif npm view "$PKG" version >/dev/null 2>&1; then echo "::warning::$PKG is published ($(npm view "$PKG" version)) but still propagating"
          else echo "::error::$PKG was NOT found on npm - publish did not land"; exit 1; fi

  ruby:
    runs-on: ubuntu-latest
    needs: test
    env:
      RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: "3.3" }
      - name: Lint (syntax)
        working-directory: clients/ruby
        run: find lib -name '*.rb' -print0 | xargs -0 -n1 ruby -c >/dev/null
      - name: Build
        working-directory: clients/ruby
        run: gem build *.gemspec
      - name: Publish
        if: env.RUBYGEMS_API_KEY != ''
        working-directory: clients/ruby
        run: |
          mkdir -p ~/.gem
          printf -- "---\n:rubygems_api_key: %s\n" "$RUBYGEMS_API_KEY" > ~/.gem/credentials
          chmod 600 ~/.gem/credentials
          gem push *.gem
      - name: Test from registry
        if: env.RUBYGEMS_API_KEY != ''
        run: |
          ok=""
          for i in 1 2 3 4 5; do gem install pescheck-client && ok=1 && break || { echo "attempt $i: not installable yet, waiting 60s"; sleep 60; }; done
          if [ -n "$ok" ]; then ruby -e "require 'pescheck-client'; puts 'OK: required pescheck-client from RubyGems'"
          elif curl -fsS "https://rubygems.org/api/v1/versions/pescheck-client.json" | grep -q '"number"'; then echo "::warning::pescheck-client is published on RubyGems but still propagating"
          else echo "::error::pescheck-client was NOT found on RubyGems - publish did not land"; exit 1; fi

  rust:
    runs-on: ubuntu-latest
    needs: test
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Lint + build
        working-directory: clients/rust
        run: cargo build
      - name: Publish
        if: env.CARGO_REGISTRY_TOKEN != ''
        working-directory: clients/rust
        run: cargo publish --allow-dirty --token "$CARGO_REGISTRY_TOKEN"
      - name: Test from registry
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: |
          cargo new /tmp/t >/dev/null 2>&1 && cd /tmp/t
          ok=""
          for i in 1 2 3 4 5; do cargo add pescheck-client && ok=1 && break || { echo "attempt $i: not in index yet, waiting 60s"; sleep 60; }; done
          if [ -n "$ok" ]; then cargo build && echo "OK: built pescheck-client from crates.io"
          elif curl -fsS -A "pescheck-ci (brampescheck@gmail.com)" "https://crates.io/api/v1/crates/pescheck-client" | grep -q '"newest_version"'; then echo "::warning::pescheck-client is published on crates.io but index still propagating"
          else echo "::error::pescheck-client was NOT found on crates.io - publish did not land"; exit 1; fi

  php:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with: { php-version: "8.2", extensions: "curl, mbstring, json" }
      - name: Lint (syntax)
        run: find clients/php/lib -name '*.php' -print0 | xargs -0 -n1 php -l >/dev/null
      - name: Build (validate manifest)
        run: composer validate --no-check-publish
      - name: Test from registry (Packagist)
        run: |
          PKG=pescheckit/pescheck-client
          mkdir /tmp/t && cd /tmp/t && echo '{}' > composer.json
          ok=""
          for i in 1 2 3 4 5; do composer require "$PKG" --no-interaction --no-progress && ok=1 && break || { echo "attempt $i: not indexed yet, waiting 60s"; sleep 60; }; done
          if [ -n "$ok" ]; then php -r 'require "vendor/autoload.php"; class_exists("Pescheck\\Client\\Api\\ChecksApi") or exit(1); echo "OK: installed pescheckit/pescheck-client from Packagist\n";'
          elif curl -fsS "https://repo.packagist.org/p2/$PKG.json" | grep -q '"version"'; then echo "::warning::$PKG is on Packagist but Composer mirrors are still propagating"
          else echo "::error::$PKG was NOT found on Packagist - not indexed"; exit 1; fi

  csharp:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write # NuGet trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: "8.0.x" }
      - name: Lint + build
        working-directory: clients/csharp
        run: dotnet build -c Release
      - name: NuGet login (OIDC trusted publishing)
        id: nugetlogin
        if: vars.PUBLISH_NUGET == 'true'
        uses: NuGet/login@v1
        with:
          user: pescheck-bram
      - name: Publish
        if: vars.PUBLISH_NUGET == 'true'
        working-directory: clients/csharp
        run: |
          dotnet pack -c Release -o ./artifacts
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "${{ steps.nugetlogin.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json --skip-duplicate
      - name: Test from registry
        if: vars.PUBLISH_NUGET == 'true'
        run: |
          mkdir /tmp/t && cd /tmp/t && dotnet new console >/dev/null
          ok=""
          for i in 1 2 3 4 5; do dotnet add package Pescheck.Client && ok=1 && break || { echo "attempt $i: not on feed yet, waiting 60s"; sleep 60; }; done
          if [ -n "$ok" ]; then dotnet build && echo "OK: restored Pescheck.Client from NuGet"
          elif curl -fsS "https://api.nuget.org/v3-flatcontainer/pescheck.client/index.json" | grep -q '"versions"'; then echo "::warning::Pescheck.Client is on NuGet but the feed is still propagating"
          else echo "::error::Pescheck.Client was NOT found on NuGet - publish did not land"; exit 1; fi

  python:
    runs-on: ubuntu-latest
    needs: test
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - name: Lint (compile) + build
        working-directory: clients/python
        run: |
          python -m compileall -q pescheck
          python -m pip install --upgrade build
          python -m build
      - name: Publish
        if: env.PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: clients/python/dist
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
      - name: Test from registry
        if: env.PYPI_API_TOKEN != ''
        run: |
          ok=""
          for i in 1 2 3 4 5; do pip install pescheck-client && ok=1 && break || { echo "attempt $i: not installable yet, waiting 60s"; sleep 60; }; done
          if [ -n "$ok" ]; then python -c "import pescheck; print('OK: imported pescheck from PyPI (pescheck-client)')"
          elif curl -fsS "https://pypi.org/pypi/pescheck-client/json" | grep -q '"version"'; then echo "::warning::pescheck-client is on PyPI but install mirrors still propagating"
          else echo "::error::pescheck-client was NOT found on PyPI - publish did not land"; exit 1; fi

  java:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: "17" }
      - name: Lint + build
        working-directory: clients/java
        run: mvn --batch-mode -DskipTests package
      - name: Publish to GitHub Packages
        working-directory: clients/java
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<XML
          <settings><servers><server>
            <id>github</id><username>${GITHUB_ACTOR}</username><password>${GITHUB_TOKEN}</password>
          </server></servers></settings>
          XML
          mvn --batch-mode -DskipTests \
            -DaltDeploymentRepository=github::https://maven.pkg.github.com/${GITHUB_REPOSITORY} \
            deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Go: no registry — publishing is a version tag (release only).
  go:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: test
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: "1.23", cache: false }
      - name: Build
        run: cd clients/go && go mod tidy && go build ./...
      - name: Tag Go submodule
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git tag "clients/go/v${VERSION}"
          git push origin "clients/go/v${VERSION}"

  # C++: no registry — attach a source tarball to the release.
  cpp:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: test
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v7
      - name: Package C++ client
        run: tar -czf pescheck-cpp-${GITHUB_REF_NAME}.tar.gz -C clients cpp
      - uses: softprops/action-gh-release@v2
        with: { files: pescheck-cpp-*.tar.gz }

  # Downloadable per-language zips on the GitHub Release, for users who don't use
  # a package manager.
  archives:
    if: github.event_name == 'release'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Zip each client (versioned)
        run: |
          V="${GITHUB_REF_NAME#v}"
          mkdir -p dist-archives
          for d in clients/*/; do
            lang=$(basename "$d")
            (cd clients && zip -rq "../dist-archives/pescheck-client-${lang}-${V}.zip" "$lang")
          done
          ls -la dist-archives
      - uses: softprops/action-gh-release@v2
        with:
          files: dist-archives/*.zip
