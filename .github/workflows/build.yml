name: Build clients

# Compiles every generated client on PRs (offline, no secrets). This catches
# code-generation / spec breakage before merge. It deliberately does NOT run the
# generator's unit-test stubs - those are empty placeholders (skipped/@Disabled/
# markTestIncomplete) that assert nothing. Real behavioral coverage is the e2e
# integration suite (e2e.yml), which runs the full CRUD against staging on main.
on:
  workflow_dispatch:
  pull_request:
    paths: ["clients/**", ".github/workflows/build.yml"]

defaults:
  run:
    shell: bash

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install -e clients/python
      - run: python -m compileall -q clients/python/pescheck

  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      - run: cd clients/javascript && npm install # babel build -> dist/

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      - run: cd clients/typescript && npm install && npm run build # tsc

  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: "17", cache: maven }
      - run: cd clients/java && mvn -q -B -DskipTests package

  csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: "8.0.x" }
      - run: dotnet build clients/csharp/src/Pescheck.Client -c Release

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: "1.23", cache: false }
      # go mod tidy first: the generator writes a go.mod requiring testify (for the
      # generated tests) but doesn't populate go.sum, so a bare `go build` fails
      # with "missing go.sum entry".
      - run: cd clients/go && go mod tidy && go build ./...

  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with: { php-version: "8.2", extensions: "curl, mbstring, json" }
      - run: find clients/php/lib -name '*.php' -print0 | xargs -0 -n1 php -l >/dev/null
      - run: cd clients/php && composer validate --no-check-publish

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cd clients/rust && cargo build

  ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: "3.3" }
      - run: find clients/ruby/lib -name '*.rb' -print0 | xargs -0 -n1 ruby -c >/dev/null
      - run: cd clients/ruby && gem build *.gemspec

  cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update && sudo apt-get install -y libcpprest-dev cmake g++
      # -Wno-return-type: the generated fromEnum() helpers don't return on the
      # (unreachable) fall-through path; harmless, silence the warning noise.
      - run: cmake -S clients/cpp -B build -DCMAKE_CXX_FLAGS="-Wno-return-type" && cmake --build build -j
