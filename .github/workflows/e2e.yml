name: E2E tests

# Real end-to-end integration tests: every client runs its native test suite
# (pytest/unittest, mocha, vitest, rspec, phpunit, go test, JUnit, dotnet test,
# cargo test, ctest) against the staging API using an OAuth2 client-credentials
# token. The tests assert the full CRUD lifecycle (checks, profiles, screenings,
# webhooks, divisions). Without a token the same suites skip cleanly (see
# unit-tests.yml). Each test depends on the generated client in clients/<lang>.
#
# Requires repo secrets PESCHECK_CLIENT_ID + PESCHECK_CLIENT_SECRET and
# (optional) repo variables PESCHECK_BASE_URL / PESCHECK_TEST_EMAIL.
on:
  workflow_dispatch:
  workflow_call: # lets publish.yml run this as a gate before publishing
  push:
    branches: [main]
    paths:
      - "clients/**"
      - "examples/**"
      - "scripts/**"
      - ".github/workflows/e2e.yml"
      - ".github/actions/**"
  schedule:
    - cron: "0 5 * * *"

# Serialize e2e runs (and the publish gate) so two runs don't mutate the same
# shared staging resources (e.g. the per-language CI divisions) concurrently.
concurrency:
  group: e2e-staging
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  PESCHECK_BASE_URL: ${{ vars.PESCHECK_BASE_URL || 'https://api-staging.pescheck.io' }}
  PESCHECK_TEST_EMAIL: ${{ vars.PESCHECK_TEST_EMAIL || 'noreply@pescheck.nl' }}

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: token
        uses: ./.github/actions/get-token
        with: { base_url: "${{ env.PESCHECK_BASE_URL }}", client_id: "${{ secrets.PESCHECK_CLIENT_ID }}", client_secret: "${{ secrets.PESCHECK_CLIENT_SECRET }}" }
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install -e clients/python
      - name: Integration test (unittest)
        run: cd examples/python && python -m unittest test_crud_integration -v
        env:
          PESCHECK_ACCESS_TOKEN: ${{ steps.token.outputs.token }}

  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: token
        uses: ./.github/actions/get-token
        with: { base_url: "${{ env.PESCHECK_BASE_URL }}", client_id: "${{ secrets.PESCHECK_CLIENT_ID }}", client_secret: "${{ secrets.PESCHECK_CLIENT_SECRET }}" }
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      - run: cd clients/javascript && npm install # builds dist/
      - name: Integration test (mocha)
        run: cd examples/javascript && npm install && npm test
        env:
          PESCHECK_ACCESS_TOKEN: ${{ steps.token.outputs.token }}

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: token
        uses: ./.github/actions/get-token
        with: { base_url: "${{ env.PESCHECK_BASE_URL }}", client_id: "${{ secrets.PESCHECK_CLIENT_ID }}", client_secret: "${{ secrets.PESCHECK_CLIENT_SECRET }}" }
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      - run: cd clients/typescript && npm install
      - name: Integration test (vitest)
        run: cd examples/typescript && npm install && npm test
        env:
          PESCHECK_ACCESS_TOKEN: ${{ steps.token.outputs.token }}

  ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: token
        uses: ./.github/actions/get-token
        with: { base_url: "${{ env.PESCHECK_BASE_URL }}", client_id: "${{ secrets.PESCHECK_CLIENT_ID }}", client_secret: "${{ secrets.PESCHECK_CLIENT_SECRET }}" }
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: "3.3" }
      - run: cd clients/ruby && gem build *.gemspec && gem install ./pescheck-client-*.gem && gem install rspec
      - name: Integration test (rspec)
        run: cd examples/ruby && rspec crud_integration_spec.rb
        env:
          PESCHECK_ACCESS_TOKEN: ${{ steps.token.outputs.token }}

  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: token
        uses: ./.github/actions/get-token
        with: { base_url: "${{ env.PESCHECK_BASE_URL }}", client_id: "${{ secrets.PESCHECK_CLIENT_ID }}", client_secret: "${{ secrets.PESCHECK_CLIENT_SECRET }}" }
      - uses: shivammathur/setup-php@v2
        with: { php-version: "8.2", extensions: "curl, mbstring, json" }
      - run: cd examples/php && composer install --no-interaction
      - name: Integration test (phpunit)
        run: cd examples/php && vendor/bin/phpunit
        env:
          PESCHECK_ACCESS_TOKEN: ${{ steps.token.outputs.token }}

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: token
        uses: ./.github/actions/get-token
        with: { base_url: "${{ env.PESCHECK_BASE_URL }}", client_id: "${{ secrets.PESCHECK_CLIENT_ID }}", client_secret: "${{ secrets.PESCHECK_CLIENT_SECRET }}" }
      - uses: actions/setup-go@v6
        with: { go-version: "1.23", cache: false }
      - name: Integration test (go test)
        run: cd examples/go-crud && go mod tidy && go test ./... -v
        env:
          PESCHECK_ACCESS_TOKEN: ${{ steps.token.outputs.token }}

  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: token
        uses: ./.github/actions/get-token
        with: { base_url: "${{ env.PESCHECK_BASE_URL }}", client_id: "${{ secrets.PESCHECK_CLIENT_ID }}", client_secret: "${{ secrets.PESCHECK_CLIENT_SECRET }}" }
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: "17", cache: maven }
      - run: mvn -q -B -f clients/java -DskipTests install
      - name: Integration test (JUnit)
        run: mvn -q -B -f examples/java test
        env:
          PESCHECK_ACCESS_TOKEN: ${{ steps.token.outputs.token }}

  csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: token
        uses: ./.github/actions/get-token
        with: { base_url: "${{ env.PESCHECK_BASE_URL }}", client_id: "${{ secrets.PESCHECK_CLIENT_ID }}", client_secret: "${{ secrets.PESCHECK_CLIENT_SECRET }}" }
      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: "8.0.x" }
      - name: Integration test (xUnit)
        run: dotnet test examples/csharp-crud -c Release
        env:
          PESCHECK_ACCESS_TOKEN: ${{ steps.token.outputs.token }}

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: token
        uses: ./.github/actions/get-token
        with: { base_url: "${{ env.PESCHECK_BASE_URL }}", client_id: "${{ secrets.PESCHECK_CLIENT_ID }}", client_secret: "${{ secrets.PESCHECK_CLIENT_SECRET }}" }
      - uses: dtolnay/rust-toolchain@stable
      - name: Integration test (cargo test)
        run: cd examples/rust && cargo test --test crud_integration -- --nocapture
        env:
          PESCHECK_ACCESS_TOKEN: ${{ steps.token.outputs.token }}

  cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: token
        uses: ./.github/actions/get-token
        with: { base_url: "${{ env.PESCHECK_BASE_URL }}", client_id: "${{ secrets.PESCHECK_CLIENT_ID }}", client_secret: "${{ secrets.PESCHECK_CLIENT_SECRET }}" }
      - run: sudo apt-get update && sudo apt-get install -y libcpprest-dev cmake g++
      - run: cmake -S examples/cpp-crud -B build-crud && cmake --build build-crud -j
      - name: Integration test (ctest)
        run: ctest --test-dir build-crud --output-on-failure
        env:
          PESCHECK_ACCESS_TOKEN: ${{ steps.token.outputs.token }}
