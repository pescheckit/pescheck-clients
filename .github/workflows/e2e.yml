name: E2E tests

# Real end-to-end CRUD test: every client obtains an OAuth2 client-credentials
# token and runs the full lifecycle (checks, profiles, screenings, webhooks,
# divisions) against staging, asserting "E2E CRUD OK".
#
# Requires repo secrets PESCHECK_CLIENT_ID + PESCHECK_CLIENT_SECRET and
# (optional) repo variable PESCHECK_BASE_URL (defaults to staging).
on:
  workflow_dispatch:
  workflow_call: # lets publish.yml run this as a gate before publishing
  push:
    branches: [main]
    paths: ["clients/**", "examples/**", "scripts/**", ".github/workflows/e2e.yml"]
  schedule:
    - cron: "0 5 * * *"

defaults:
  run:
    shell: bash

env:
  PESCHECK_BASE_URL: ${{ vars.PESCHECK_BASE_URL || 'https://api-staging.pescheck.io' }}
  PESCHECK_TEST_EMAIL: ${{ vars.PESCHECK_TEST_EMAIL || 'noreply@pescheck.nl' }}

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: token
        uses: ./.github/actions/get-token
        with: { base_url: "${{ env.PESCHECK_BASE_URL }}", client_id: "${{ secrets.PESCHECK_CLIENT_ID }}", client_secret: "${{ secrets.PESCHECK_CLIENT_SECRET }}" }
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install -e clients/python
      # Full CRUD lifecycle (checks, profiles, screenings, webhooks, divisions).
      - run: python examples/python/crud_lifecycle.py
        env:
          PESCHECK_ACCESS_TOKEN: ${{ steps.token.outputs.token }}

  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: token
        uses: ./.github/actions/get-token
        with: { base_url: "${{ env.PESCHECK_BASE_URL }}", client_id: "${{ secrets.PESCHECK_CLIENT_ID }}", client_secret: "${{ secrets.PESCHECK_CLIENT_SECRET }}" }
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      # Build the client first (installs babel + produces dist/), then install the
      # example with --ignore-scripts so it reuses the built client (no babel needed).
      - run: cd clients/javascript && npm install
      # Full CRUD lifecycle (checks, profiles, screenings, webhooks, divisions).
      - run: cd examples/javascript && npm install --ignore-scripts && node crud_lifecycle.js
        env:
          PESCHECK_ACCESS_TOKEN: ${{ steps.token.outputs.token }}

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: token
        uses: ./.github/actions/get-token
        with: { base_url: "${{ env.PESCHECK_BASE_URL }}", client_id: "${{ secrets.PESCHECK_CLIENT_ID }}", client_secret: "${{ secrets.PESCHECK_CLIENT_SECRET }}" }
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      - run: cd clients/typescript && npm install
      - run: cd examples/typescript && npm install && npm run build && node dist/crud_lifecycle.js
        env:
          PESCHECK_ACCESS_TOKEN: ${{ steps.token.outputs.token }}

  ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: token
        uses: ./.github/actions/get-token
        with: { base_url: "${{ env.PESCHECK_BASE_URL }}", client_id: "${{ secrets.PESCHECK_CLIENT_ID }}", client_secret: "${{ secrets.PESCHECK_CLIENT_SECRET }}" }
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: "3.3" }
      - run: cd clients/ruby && gem build *.gemspec && gem install ./pescheck-client-*.gem
      - run: cd examples/ruby && ruby crud_lifecycle.rb
        env:
          PESCHECK_ACCESS_TOKEN: ${{ steps.token.outputs.token }}

  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: token
        uses: ./.github/actions/get-token
        with: { base_url: "${{ env.PESCHECK_BASE_URL }}", client_id: "${{ secrets.PESCHECK_CLIENT_ID }}", client_secret: "${{ secrets.PESCHECK_CLIENT_SECRET }}" }
      - uses: shivammathur/setup-php@v2
        with: { php-version: "8.2", extensions: "curl, mbstring, json" }
      - run: cd examples/php && composer install --no-interaction
      # Full CRUD lifecycle (checks, profiles, screenings, webhooks, divisions).
      - run: cd examples/php && php crud_lifecycle.php
        env:
          PESCHECK_ACCESS_TOKEN: ${{ steps.token.outputs.token }}

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: token
        uses: ./.github/actions/get-token
        with: { base_url: "${{ env.PESCHECK_BASE_URL }}", client_id: "${{ secrets.PESCHECK_CLIENT_ID }}", client_secret: "${{ secrets.PESCHECK_CLIENT_SECRET }}" }
      - uses: actions/setup-go@v6
        with: { go-version: "1.23", cache: false }
      - run: cd examples/go-crud && go mod tidy && go run .
        env:
          PESCHECK_ACCESS_TOKEN: ${{ steps.token.outputs.token }}

  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: token
        uses: ./.github/actions/get-token
        with: { base_url: "${{ env.PESCHECK_BASE_URL }}", client_id: "${{ secrets.PESCHECK_CLIENT_ID }}", client_secret: "${{ secrets.PESCHECK_CLIENT_SECRET }}" }
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: "17", cache: maven }
      - run: mvn -q -B -f clients/java -DskipTests install
      - run: mvn -q -B -f clients/java dependency:build-classpath -Dmdep.outputFile=$PWD/cp.txt
      - run: |
          CP="clients/java/target/classes:$(cat cp.txt)"
          javac -cp "$CP" -d examples/java examples/java/CrudLifecycle.java
          java -cp "examples/java:$CP" CrudLifecycle
        env:
          PESCHECK_ACCESS_TOKEN: ${{ steps.token.outputs.token }}

  csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: token
        uses: ./.github/actions/get-token
        with: { base_url: "${{ env.PESCHECK_BASE_URL }}", client_id: "${{ secrets.PESCHECK_CLIENT_ID }}", client_secret: "${{ secrets.PESCHECK_CLIENT_SECRET }}" }
      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: "8.0.x" }
      - run: dotnet run --project examples/csharp-crud -c Release
        env:
          PESCHECK_ACCESS_TOKEN: ${{ steps.token.outputs.token }}

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: token
        uses: ./.github/actions/get-token
        with: { base_url: "${{ env.PESCHECK_BASE_URL }}", client_id: "${{ secrets.PESCHECK_CLIENT_ID }}", client_secret: "${{ secrets.PESCHECK_CLIENT_SECRET }}" }
      - uses: dtolnay/rust-toolchain@stable
      - run: cd examples/rust && cargo run --quiet --bin crud_lifecycle
        env:
          PESCHECK_ACCESS_TOKEN: ${{ steps.token.outputs.token }}

  cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: token
        uses: ./.github/actions/get-token
        with: { base_url: "${{ env.PESCHECK_BASE_URL }}", client_id: "${{ secrets.PESCHECK_CLIENT_ID }}", client_secret: "${{ secrets.PESCHECK_CLIENT_SECRET }}" }
      - run: sudo apt-get update && sudo apt-get install -y libcpprest-dev cmake g++
      - run: cmake -S examples/cpp-crud -B build && cmake --build build -j
      - run: ./build/e2e_crud
        env:
          PESCHECK_ACCESS_TOKEN: ${{ steps.token.outputs.token }}
